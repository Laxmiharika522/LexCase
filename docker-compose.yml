version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: lexcase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lexcase
      POSTGRES_PASSWORD: lexcase
      POSTGRES_DB: lexcase
    ports:
      - "5433:5432"   # 5433 on host — 5432 is often taken by other projects
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lexcase"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: lexcase-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://lexcase:lexcase@postgres:5432/lexcase"
      CORS_ORIGINS: "http://localhost:3000"
      FRONTEND_URL: "http://localhost:3000"
      JWT_SECRET: "change-me-to-a-random-64-char-hex-secret"
      ADMIN_EMAIL: "admin@lexcase.com"
      ADMIN_PASSWORD: "Admin@123"
      ADMIN_NAME: "Firm Administrator"
      STORAGE_BACKEND: "local"
      STORAGE_DIR: "/app/storage"
      EMERGENT_LLM_KEY: "${EMERGENT_LLM_KEY:-sk-emergent-placeholder}"
      APP_NAME: "lexcase"
      ENVIRONMENT: "development"
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    container_name: lexcase-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_BACKEND_URL: "http://localhost:8001"
      WDS_SOCKET_PORT: "0"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres_data: