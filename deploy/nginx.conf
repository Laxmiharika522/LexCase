# Nginx config for AWS EC2 — serves React build and proxies API to FastAPI.
# Place at /etc/nginx/conf.d/lexcase.conf

server {
    listen 80;
    server_name _;

    root /opt/lexcase/frontend/build;
    index index.html;

    # React SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to Uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;

        # Required for SSE (AI document summarization stream)
        proxy_buffering off;
        proxy_cache off;
    }

    # Health check
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}