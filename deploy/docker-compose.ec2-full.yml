# Full-stack EC2 deployment: nginx + React + FastAPI + PostgreSQL
# Usage (on EC2, from repo root):
#   cp deploy/env.ec2-full.example .env
#   nano .env                          # set EC2_PUBLIC_IP + JWT_SECRET
#   docker compose -f deploy/docker-compose.ec2-full.yml up -d --build
#   docker compose -f deploy/docker-compose.ec2-full.yml exec backend python seed.py

services:
  postgres:
    image: postgres:15-alpine
    container_name: lexcase-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lexcase}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lexcase}
      POSTGRES_DB: ${POSTGRES_DB:-lexcase}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lexcase}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    container_name: lexcase-backend
    restart: unless-stopped
    command: ["uvicorn", "server:app", "--host", "0.0.0.0", "--port", "8001"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://${POSTGRES_USER:-lexcase}:${POSTGRES_PASSWORD:-lexcase}@postgres:5432/${POSTGRES_DB:-lexcase}"
      CORS_ORIGINS: "http://${EC2_PUBLIC_IP}"
      FRONTEND_URL: "http://${EC2_PUBLIC_IP}"
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@lexcase.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
      ADMIN_NAME: ${ADMIN_NAME:-Firm Administrator}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-local}
      STORAGE_DIR: /app/storage
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
      APP_NAME: lexcase
      ENVIRONMENT: development
    volumes:
      - backend_storage:/app/storage

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        REACT_APP_BACKEND_URL: ""
    container_name: lexcase-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  backend_storage: